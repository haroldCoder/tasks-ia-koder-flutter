name: widgetbook_workspace
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  widgetbook: ^3.16.0
  widgetbook_annotation: ^3.7.0
  tasks_ia_koderx:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.6.0
  widgetbook_generator: ^3.7.0

flutter:
  uses-material-design: true

  fonts:
    - family: Almendra
      fonts:
        - asset: lib/assets/fonts/Almendra-Regular.ttf
        - asset: lib/assets/fonts/Almendra-BoldItalic.ttf
          weight: 700
    - family: Caveat
      fonts:
        - asset: lib/assets/fonts/Caveat-VariableFont_wght.ttf
          weight: 700
    - family: JosefinSans
      fonts:
        - asset: lib/assets/fonts/JosefinSans-VariableFont_wght.ttf
          weight: 700
    - family: MysteryQuest
      fonts:
        - asset: lib/assets/fonts/MysteryQuest-Regular.ttf
    - family: Oswald
      fonts:
        - asset: lib/assets/fonts/Oswald-VariableFont_wght.ttf
          weight: 700
